<!DOCTYPE html>
<html>
<body>
<svg width="200" height="200" style="border:1px solid red;">
    <defs>
        <pattern id="arrow-right" patternUnits="userSpaceOnUse" width="20" height="20">
            <!-- image goes here, we use a simple polygon for test -->
            <polygon points="0,5 15,5 15,0 20,10 15,20 15,15 0,15" fill="black"/>
        </pattern>
        <pattern id="arrow-down" patternUnits="userSpaceOnUse" width="20" height="20">
            <polygon points="0,5 15,5 15,0 20,10 15,20 15,15 0,15" fill="blue" transform="rotate(90 10 10)"/>
        </pattern>
    </defs>
    <line x1="10" y1="50" x2="190" y2="50" stroke="url(#arrow-right)" stroke-width="20" />
    <line x1="50" y1="10" x2="50" y2="190" stroke="url(#arrow-down)" stroke-width="20" />
</svg>
</body>
</html>
