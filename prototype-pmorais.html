<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Elysium λ Prototype - Paulo Morais Digital Transformation.">
    <title>Prototipo: Paulo Morais</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600&family=Playfair+Display:wght@400;700&display=swap"
        rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="CSS/base.css">
    <link rel="stylesheet" href="CSS/components.css">
    <link rel="stylesheet" href="CSS/pages.css">

    <style>
        .prototype-container {
            padding: 4rem 0;
            background: var(--color-bg);
        }

        .prototype-gallery {
            display: flex;
            flex-direction: column;
            gap: 6rem;
            max-width: 1000px;
            margin: 0 auto;
        }

        .prototype-item {
            text-align: center;
        }

        .prototype-item h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            margin-bottom: 2rem;
            color: var(--color-accent);
            opacity: 0.9;
        }

        .prototype-frame {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 1rem;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            overflow: hidden;
            line-height: 0;
        }

        .prototype-frame:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: rgba(212, 175, 55, 0.3);
        }

        .prototype-frame img {
            width: 100%;
            height: auto;
            border-radius: 4px;
        }

        .prototype-info {
            margin-top: 1.5rem;
            color: var(--color-text-secondary);
            font-style: italic;
            font-size: 0.9rem;
        }

        .back-to-portfolio {
            margin-top: 4rem;
            display: inline-block;
        }
    </style>

    <!-- Favicon -->
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
</head>

<body>
    <!-- Premium Preloader -->
    <div id="elysium-preloader">
        <div class="preloader-content">
            <span class="preloader-lambda">λ</span>
        </div>
    </div>

    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="nav-brand">
                <span class="brand-symbol">λ</span> ELYSIUM
            </a>
            <div class="nav-links">
                <a href="services.html" class="nav-link">Servicios</a>
                <a href="portfolio.html" class="nav-link">Portafolio</a>
                <a href="research.html" class="nav-link">Investigación</a>
                <a href="about.html" class="nav-link">Nosotros</a>
                <a href="contact.html" class="btn btn-primary">Contacto</a>
            </div>
            <div class="mobile-toggle">☰</div>
        </div>
    </nav>

    <!-- Header -->
    <header class="page-header">
        <div class="parallax-lambda">λ</div>
        <div class="container animate-on-scroll">
            <h1 style="font-size: 3rem;">Prototipo</h1>
            <p class="hero-subtitle">Paulo Morais — Digital Experience</p>
        </div>
    </header>

    <!-- Content -->
    <section class="prototype-container">
        <div class="container">
            <div class="prototype-gallery">
                
                <!-- Home / Index -->
                <div class="prototype-item animate-on-scroll">
                    <h2>Página Principal</h2>
                    <div class="prototype-frame">
                        <picture>
                            <source media="(max-width: 768px)" srcset="Images/Portfolio/prototype/pmorais/index-mobile.png">
                            <img src="Images/Portfolio/prototype/pmorais/index.png" alt="Prototype Home Page">
                        </picture>
                    </div>
                </div>

                <!-- Sobre Mim -->
                <div class="prototype-item animate-on-scroll delay-1">
                    <h2>Sobre Mi</h2>
                    <div class="prototype-frame">
                        <picture>
                            <source media="(max-width: 768px)" srcset="Images/Portfolio/prototype/pmorais/sobremim-mobile.png">
                            <img src="Images/Portfolio/prototype/pmorais/sobre-mim.png" alt="Prototype About Page">
                        </picture>
                    </div>
                </div>

                <!-- Osteopatia -->
                <div class="prototype-item animate-on-scroll delay-2">
                    <h2>Osteopatía</h2>
                    <div class="prototype-frame">
                        <picture>
                            <source media="(max-width: 768px)" srcset="Images/Portfolio/prototype/pmorais/osteopatia-mobile.png">
                            <img src="Images/Portfolio/prototype/pmorais/osteopatia.png" alt="Prototype Osteopathy Page">
                        </picture>
                    </div>
                </div>

                <!-- Login / Perfil -->
                <div class="prototype-item animate-on-scroll">
                    <h2>Inicio de Sesión / Registro</h2>
                    <div class="prototype-frame">
                        <picture>
                            <source media="(max-width: 768px)" srcset="Images/Portfolio/prototype/pmorais/perfil-mobile.png">
                            <img src="Images/Portfolio/prototype/pmorais/perfil.png" alt="Prototype Login Page">
                        </picture>
                    </div>
                </div>

            </div>

            <div style="text-align: center;">
                <a href="es/portfolio.html" class="btn back-to-portfolio">← Volver al Portafolio</a>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <div class="container">
            <div class="footer-bottom">
                <span>&copy; 2026 Elysium λ Development & Research. Todos los derechos reservados.</span>
                <span class="brand-symbol footer-lambda">λ</span>
            </div>
        </div>
    </footer>

    <script src="JS/main.js"></script>
</body>

</html>
