<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>License Seeder - Elysium</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #020410; color: white; }
        .container { max-width: 600px; margin: 0 auto; background: rgba(255,255,255,0.05); padding: 30px; border-radius: 12px; }
        button { padding: 10px 20px; cursor: pointer; background: #ffcc00; border: none; font-weight: bold; border-radius: 6px; }
        #status { margin-top: 20px; white-space: pre-wrap; font-family: monospace; }
        .license-list { height: 200px; overflow-y: scroll; background: #000; padding: 10px; margin-top: 10px; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Elysium License Seeder</h1>
        <p>This script will generate 100 license codes and upload them to Firestore.</p>
        <button id="seedBtn">Generate & Seed 100 Licenses</button>
        <div id="status">Ready...</div>
        <div id="licenses" class="license-list"></div>
    </div>

    <script type="module">
        import { db } from './JS/firebase-config.js';
        import { collection, doc, setDoc, writeBatch } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const seedBtn = document.getElementById('seedBtn');
        const statusDiv = document.getElementById('status');
        const licensesDiv = document.getElementById('licenses');

        function generateCode() {
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; // Avoid ambiguous chars
            let result = 'ELY-';
            for (let i = 0; i < 3; i++) {
                for (let j = 0; j < 4; j++) {
                    result += chars.charAt(Math.floor(Math.random() * chars.length));
                }
                if (i < 2) result += '-';
            }
            return result;
        }

        seedBtn.addEventListener('click', async () => {
            seedBtn.disabled = true;
            statusDiv.textContent = 'Generating codes...';
            
            const licenses = [];
            for (let i = 0; i < 100; i++) {
                licenses.push(generateCode());
            }

            licensesDiv.innerHTML = licenses.join('<br>');
            statusDiv.textContent = 'Uploading to Firestore (batches of 500)...';

            try {
                const batch = writeBatch(db);
                const licensesCol = collection(db, 'licenses');

                for (const code of licenses) {
                    const docRef = doc(licensesCol, code);
                    batch.set(docRef, {
                        code: code,
                        status: 'active',
                        assignedTo: null,
                        usedAt: null,
                        createdAt: new Date()
                    });
                }

                await batch.commit();
                statusDiv.textContent = 'SUCCESS! 100 licenses seeded successfully.';
                statusDiv.style.color = '#00ff00';
            } catch (error) {
                console.error(error);
                statusDiv.textContent = 'ERROR: ' + error.message;
                statusDiv.style.color = '#ff4444';
                seedBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
